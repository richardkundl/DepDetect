name: python-ci

on:
  pull_request:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  lint_ruff:
    name: Ruff
    runs-on: arc-runner-set-agrocorp
    steps:
      - uses: actions/checkout@v6

      - name: Run Ruff (lint)
        # This action installs and/or runs Ruff in GitHub Actions.
        uses: astral-sh/ruff-action@v3
        with:
          args: 'check . --output-format sarif --output-file ruff.sarif'

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ruff.sarif

  test_coverage:
    name: Unit tests + coverage
    runs-on: arc-runner-set-agrocorp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: 3.13
          cache: pip
      - name: Install deps
        run: |
          pip install coverage
          pip install -e .

      # Run tests but DO NOT fail the job
      - name: Run unittest with coverage (allow failure)
        id: run_tests
        continue-on-error: true
        run: |
          # run tests + coverage, log output 
          python -m coverage run -m unittest discover -s tests 

          # generate coverage XML regardless of failure
          # necessary for parallel = True          
          python -m coverage combine
          
          python -m coverage xml -o coverage.xml
          python -m coverage report

      # Upload coverage xml even if tests failed
      - name: Upload coverage.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      # Optional: mark overall status based on tests
      - name: Final status
        if: steps.run_tests.outcome == 'failure'
        run: echo "⚠️ Tests failed, but workflow will not fail."

  bandit:
    name: Bandit security scan
    runs-on: arc-runner-set-agrocorp
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          pip-install: bandit[sarif,toml]
          python-version: 3.13
          cache: pip

      - name: Run Bandit (SARIF)
        run: |
          python -m bandit --version
          bandit -r src -x tests -f sarif -o bandit.sarif --exit-zero

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit.sarif

  sonarqube:
    name: SonarQube scan
    runs-on: arc-runner-set-agrocorp
    needs: [ lint_ruff, test_coverage, bandit ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage.xml
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
          SONAR_HOST_URL: "https://sonarqube.sativus.uk"
        with:
          args: >
            -Dsonar.projectKey=agrocorp_depdetect
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.python.version=3.13

      # Optional: fail pipeline if Quality Gate is red (typically for deploy jobs)
      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}

  build_and_publish:
    name: Build + publish to Nexus PyPI
    runs-on: arc-runner-set-agrocorp
    needs: [ sonarqube ]
    # Only publish from main; adjust to tags/releases if you prefer.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Build package (sdist + wheel)
        run: |
          python3.13 -m pip install build
          python3.13 -m build

      - name: Upload to Nexus with Twine
        env:
          TWINE_REPOSITORY_URL: "https://nexus.sativus.uk/repository/sativus-pypy-hosted/"
          TWINE_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          python3.13 -m pip install twine
          python3.13 -m twine upload dist/*
